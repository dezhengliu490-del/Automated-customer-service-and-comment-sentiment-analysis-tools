<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620"><style>.title{font:700 22px "Segoe UI","Microsoft YaHei",sans-serif;fill:#1f3c5b;}.subtitle{font:400 12px "Segoe UI","Microsoft YaHei",sans-serif;fill:#61758a;}.label{font:600 13px "Segoe UI","Microsoft YaHei",sans-serif;fill:#1f2d3d;}.small{font:400 11px "Segoe UI","Microsoft YaHei",sans-serif;fill:#51606f;}.value{font:700 18px "Segoe UI","Microsoft YaHei",sans-serif;fill:#0f2740;}.pill{font:700 12px "Segoe UI","Microsoft YaHei",sans-serif;fill:#ffffff;}.axis{font:400 11px "Segoe UI","Microsoft YaHei",sans-serif;fill:#566573;}</style><rect width="100%" height="100%" fill="#fbfcfe"/><text x="40" y="48" class="title"><tspan x="40" dy="0">Market Drivers Backing the Venture</tspan></text><text x="40" y="72" class="subtitle"><tspan x="40" dy="0">External signals show that AI-enabled customer service, review response, and digital support are moving</tspan><tspan x="40" dy="15">into the mainstream.</tspan></text><rect x="40" y="120" width="205" height="195" rx="18" fill="#1f77b4"/><text x="58" y="174" class="pill" style="font-size:34px">58%</text><text x="58" y="212" class="pill"><tspan x="58" dy="0">Consumers comfortable</tspan><tspan x="58" dy="16">with chatbots or AI-</tspan><tspan x="58" dy="16">powered support</tspan></text><text x="58" y="274" class="pill"><tspan x="58" dy="0">Qualtrics 2024 Consumer</tspan><tspan x="58" dy="13">Experience Trends</tspan></text><rect x="270" y="120" width="205" height="195" rx="18" fill="#2ca02c"/><text x="288" y="174" class="pill" style="font-size:34px">88%</text><text x="288" y="212" class="pill"><tspan x="288" dy="0">Consumers would use a</tspan><tspan x="288" dy="16">business that replies to</tspan><tspan x="288" dy="16">all reviews</tspan></text><text x="288" y="274" class="pill"><tspan x="288" dy="0">BrightLocal 2024 Local</tspan><tspan x="288" dy="13">Consumer Review Survey</tspan></text><rect x="500" y="120" width="205" height="195" rx="18" fill="#ff7f0e"/><text x="518" y="174" class="pill" style="font-size:34px">75%</text><text x="518" y="212" class="pill"><tspan x="518" dy="0">Consumers always or</tspan><tspan x="518" dy="16">regularly read online</tspan><tspan x="518" dy="16">reviews</tspan></text><text x="518" y="274" class="pill"><tspan x="518" dy="0">BrightLocal 2024 Local</tspan><tspan x="518" dy="13">Consumer Review Survey</tspan></text><rect x="730" y="120" width="205" height="195" rx="18" fill="#9467bd"/><text x="748" y="174" class="pill" style="font-size:34px">95%</text><text x="748" y="212" class="pill"><tspan x="748" dy="0">Shoppers say delivery</tspan><tspan x="748" dy="16">options influence where</tspan><tspan x="748" dy="16">they shop online</tspan></text><text x="748" y="274" class="pill"><tspan x="748" dy="0">DHL 2024 Online Purchasing</tspan><tspan x="748" dy="13">Behavior Report</tspan></text><text x="40" y="372" class="label"><tspan x="40" dy="0">Industry growth signals</tspan></text><text x="40" y="394" class="small"><tspan x="40" dy="0">AI for customer service is forecast to grow rapidly, with retail and e-commerce among the fastest-growing end-use</tspan><tspan x="40" dy="15">sectors.</tspan></text><line x1="85" y1="548" x2="915" y2="548" stroke="#b8c6d6"/><rect x="170" y="478" width="130" height="70" rx="14" fill="#90caf9"/><rect x="650" y="278" width="130" height="270" rx="14" fill="#1565c0"/><text x="150" y="574" class="axis"><tspan x="150" dy="0">2024 market size</tspan></text><text x="615" y="574" class="axis"><tspan x="615" dy="0">2033 projected</tspan><tspan x="615" dy="14">size</tspan></text><text x="188" y="470" class="label"><tspan x="188" dy="0">$13.0B</tspan></text><text x="668" y="270" class="label"><tspan x="668" dy="0">$83.9B</tspan></text><text x="365" y="484" class="value"><tspan x="365" dy="0">23.2% CAGR</tspan></text><text x="365" y="510" class="small"><tspan x="365" dy="0">Global AI for customer service market, 2025-2033</tspan><tspan x="365" dy="15">forecast</tspan></text><text x="365" y="540" class="small"><tspan x="365" dy="0">Retail and e-commerce expected fastest end-use CAGR:</tspan><tspan x="365" dy="15">26.0%</tspan></text><text x="365" y="586" class="small"><tspan x="365" dy="0">Source: Grand View Research, 2025 report using 2024 base-</tspan><tspan x="365" dy="14">year estimates</tspan></text></svg>