t><text x="540" y="190" class="small" fill="#44576a"><tspan x="540" dy="0">Low</tspan></text><text x="690" y="190" class="small" fill="#44576a"><tspan x="690" dy="0">High</tspan></text><text x="820" y="190" class="small" fill="#44576a"><tspan x="820" dy="0">Complex</tspan><tspan x="820" dy="15">escalations</tspan></text><rect x="52" y="238" width="876" height="64" rx="10" fill="#eef4f9"/><text x="60" y="268" class="small" fill="#6b7c93"><tspan x="60" dy="0">Rule-based bot</tspan></text><text x="250" y="268" class="small" fill="#44576a"><tspan x="250" dy="0">High</tspan></text><text x="390" y="268" class="small" fill="#44576a"><tspan x="390" dy="0">Low</tspan></text><text x="540" y="268" class="small" fill="#44576a"><tspan x="540" dy="0">Low</tspan></text><text x="690" y="268" class="small" fill="#44576a"><tspan x="690" dy="0">Medium</tspan></text><text x="820" y="268" class="small" fill="#44576a"><tspan x="820" dy="0">Simple FAQs</tspan></text><rect x="52" y="316" width="876" height="64" rx="10" fill="#f8fbff"/><text x="60" y="346" class="small" fill="#6b7c93"><tspan x="60" dy="0">Generic LLM</tspan><tspan x="60" dy="15">workflow</tspan></text><text x="250" y="346" class="small" fill="#44576a"><tspan x="250" dy="0">Low</tspan></text><text x="390" y="346" class="small" fill="#44576a"><tspan x="390" dy="0">High</tspan></text><text x="540" y="346" class="small" fill="#44576a"><tspan x="540" dy="0">Medium</tspan></text><text x="690" y="346" class="small" fill="#44576a"><tspan x="690" dy="0">Low</tspan></text><text x="820" y="346" class="small" fill="#44576a"><tspan x="820" dy="0">Fast prototyping</tspan></text><rect x="52" y="394" width="876" height="64" rx="10" fill="#eef4f9"/><text x="60" y="424" class="label" fill="#1565c0"><tspan x="60" dy="0">Integrated AI ops</tspan><tspan x="60" dy="15">tool</tspan></text><text x="250" y="424" class="small" fill="#44576a"><tspan x="250" dy="0">High</tspan></text><text x="390" y="424" class="small" fill="#44576a"><tspan x="390" dy="0">High</tspan></text><text x="540" y="424" class="small" fill="#44576a"><tspan x="540" dy="0">High</tspan></text><text x="690" y="424" class="small" fill="#44576a"><tspan x="690" dy="0">Medium</tspan></text><text x="820" y="424" class="small" fill="#44576a"><tspan x="820" dy="0">SMB e-commerce</tspan></text><text x="60" y="490" class="small"><tspan x="60" dy="0">Interpretation: our strongest wedge is the combination of policy control, reply flexibility, and</tspan><tspan x="60" dy="15">review insight in one workflow.</tspan></text><text x="60" y="530" class="small"><tspan x="60" dy="0">That positioning is especially attractive for merchants who cannot afford enterprise CX suites but</tspan><tspan x="60" dy="15">need more than a simple bot.</tspan></text></svg>