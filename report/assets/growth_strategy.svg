<svg xmlns="http://www.w3.org/2000/svg" width="980" height="580" viewBox="0 0 980 580"><style>.title{font:700 22px "Segoe UI","Microsoft YaHei",sans-serif;fill:#1f3c5b;}.subtitle{font:400 12px "Segoe UI","Microsoft YaHei",sans-serif;fill:#61758a;}.label{font:600 13px "Segoe UI","Microsoft YaHei",sans-serif;fill:#1f2d3d;}.small{font:400 11px "Segoe UI","Microsoft YaHei",sans-serif;fill:#51606f;}.value{font:700 18px "Segoe UI","Microsoft YaHei",sans-serif;fill:#0f2740;}.pill{font:700 12px "Segoe UI","Microsoft YaHei",sans-serif;fill:#ffffff;}.axis{font:400 11px "Segoe UI","Microsoft YaHei",sans-serif;fill:#566573;}</style><rect width="100%" height="100%" fill="#fcfdff"/><text x="40" y="48" class="title"><tspan x="40" dy="0">Pricing, Go-to-Market, and Scalability</tspan></text><text x="40" y="72" class="subtitle"><tspan x="40" dy="0">A staged SaaS model reduces adoption friction and gives the team a clear expansion path.</tspan></text><rect x="50" y="120" width="250" height="195" rx="18" fill="#eaf4ff" stroke="#d7e3f1"/><text x="68" y="154" class="label"><tspan x="68" dy="0">Basic</tspan></text><text x="68" y="188" class="value"><tspan x="68" dy="0">RMB 199-399 / month</tspan></text><text x="68" y="228" class="small"><tspan x="68" dy="0">- Review upload and analysis</tspan></text><text x="68" y="264" class="small"><tspan x="68" dy="0">- Basic automated replies</tspan></text><text x="68" y="300" class="small"><tspan x="68" dy="0">- Single-store dashboard</tspan></text><rect x="365" y="120" width="250" height="195" rx="18" fill="#eef8ef" stroke="#d7e3f1"/><text x="383" y="154" class="label"><tspan x="383" dy="0">Pro</tspan></text><text x="383" y="188" class="value"><tspan x="383" dy="0">RMB 699-1299 / month</tspan></text><text x="383" y="228" class="small"><tspan x="383" dy="0">- Higher monthly volume</tspan></text><text x="383" y="264" class="small"><tspan x="383" dy="0">- Knowledge base and retry</tspan><tspan x="383" dy="16">workflow</tspan></text><text x="383" y="316" class="small"><tspan x="383" dy="0">- Exportable insight report</tspan></text><rect x="680" y="120" width="250" height="195" rx="18" fill="#fff4e8" stroke="#d7e3f1"/><text x="698" y="154" class="label"><tspan x="698" dy="0">Enterprise</tspan></text><text x="698" y="188" class="value"><tspan x="698" dy="0">Custom quote</tspan></text><text x="698" y="228" class="small"><tspan x="698" dy="0">- Private deployment</tspan></text><text x="698" y="264" class="small"><tspan x="698" dy="0">- API integration</tspan></text><text x="698" y="300" class="small"><tspan x="698" dy="0">- Multi-brand governance</tspan></text><rect x="80" y="390" width="220" height="105" rx="16" fill="#ffffff" stroke="#cfdbe8"/><text x="96" y="418" class="label"><tspan x="96" dy="0">Stage 1</tspan></text><text x="96" y="444" class="small"><tspan x="96" dy="0">Win with negative-review</tspan><tspan x="96" dy="15">monitoring and after-sales</tspan><tspan x="96" dy="15">response</tspan></text><rect x="340" y="390" width="220" height="105" rx="16" fill="#ffffff" stroke="#cfdbe8"/><text x="356" y="418" class="label"><tspan x="356" dy="0">Stage 2</tspan></text><text x="356" y="444" class="small"><tspan x="356" dy="0">Upsell merchant rule base,</tspan><tspan x="356" dy="15">dashboards, and monthly</tspan><tspan x="356" dy="15">insight reports</tspan></text><rect x="600" y="390" width="220" height="105" rx="16" fill="#ffffff" stroke="#cfdbe8"/><text x="616" y="418" class="label"><tspan x="616" dy="0">Stage 3</tspan></text><text x="616" y="444" class="small"><tspan x="616" dy="0">Expand to APIs, multi-store</tspan><tspan x="616" dy="15">workflows, and adjacent</tspan><tspan x="616" dy="15">service verticals</tspan></text><line x1="300" y1="442" x2="340" y2="442" stroke="#90a4ae" stroke-width="2"/><line x1="560" y1="442" x2="600" y2="442" stroke="#90a4ae" stroke-width="2"/></svg>