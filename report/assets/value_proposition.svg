<svg xmlns="http://www.w3.org/2000/svg" width="980" height="600" viewBox="0 0 980 600"><style>.title{font:700 22px "Segoe UI","Microsoft YaHei",sans-serif;fill:#1f3c5b;}.subtitle{font:400 12px "Segoe UI","Microsoft YaHei",sans-serif;fill:#61758a;}.label{font:600 13px "Segoe UI","Microsoft YaHei",sans-serif;fill:#1f2d3d;}.small{font:400 11px "Segoe UI","Microsoft YaHei",sans-serif;fill:#51606f;}.value{font:700 18px "Segoe UI","Microsoft YaHei",sans-serif;fill:#0f2740;}.pill{font:700 12px "Segoe UI","Microsoft YaHei",sans-serif;fill:#ffffff;}.axis{font:400 11px "Segoe UI","Microsoft YaHei",sans-serif;fill:#566573;}</style><rect width="100%" height="100%" fill="#f8fbff"/><text x="40" y="48" class="title"><tspan x="40" dy="0">Value Proposition and Differentiation</tspan></text><text x="40" y="72" class="subtitle"><tspan x="40" dy="0">Our product sits between generic AI tools and operational SaaS by combining reply automation, review</tspan><tspan x="40" dy="15">insight, and merchant-rule grounding.</tspan></text><rect x="50" y="120" width="270" height="175" rx="18" fill="#eaf4ff" stroke="#d7e3f1"/><text x="68" y="150" class="label"><tspan x="68" dy="0">Customer Service Efficiency</tspan></text><text x="68" y="184" class="value"><tspan x="68" dy="0">Automates repetitive</tspan><tspan x="68" dy="20">after-sales replies</tspan></text><text x="68" y="234" class="small"><tspan x="68" dy="0">RAG-grounded replies reduce response</tspan><tspan x="68" dy="16">time and keep policy consistency.</tspan></text><rect x="355" y="120" width="270" height="175" rx="18" fill="#eef8ef" stroke="#d7e3f1"/><text x="373" y="150" class="label"><tspan x="373" dy="0">Review Insight Engine</tspan></text><text x="373" y="184" class="value"><tspan x="373" dy="0">Turns reviews into</tspan><tspan x="373" dy="20">action items</tspan></text><text x="373" y="234" class="small"><tspan x="373" dy="0">Sentiment and pain-point extraction</tspan><tspan x="373" dy="16">helps merchants prioritize quality,</tspan><tspan x="373" dy="16">sizing, and service issues.</tspan></text><rect x="660" y="120" width="270" height="175" rx="18" fill="#fff4e8" stroke="#d7e3f1"/><text x="678" y="150" class="label"><tspan x="678" dy="0">Closed-loop Operations</tspan></text><text x="678" y="184" class="value"><tspan x="678" dy="0">From feedback to</tspan><tspan x="678" dy="20">execution</tspan></text><text x="678" y="234" class="small"><tspan x="678" dy="0">The same system supports support</tspan><tspan x="678" dy="16">response, issue detection, and</tspan><tspan x="678" dy="16">business reporting.</tspan></text><text x="40" y="350" class="label"><tspan x="40" dy="0">Why it is different</tspan></text><rect x="40" y="370" width="900" height="185" rx="20" fill="#ffffff" stroke="#d9e3ec"/><text x="65" y="402" class="label"><tspan x="65" dy="0">Alternative</tspan></text><text x="270" y="402" class="label"><tspan x="270" dy="0">Typical Weakness</tspan></text><text x="560" y="402" class="label"><tspan x="560" dy="0">Our Advantage</tspan></text><text x="65" y="438" class="small"><tspan x="65" dy="0">Human outsourcing</tspan></text><text x="270" y="438" class="small"><tspan x="270" dy="0">High labor cost, knowledge not</tspan><tspan x="270" dy="15">reusable</tspan></text><text x="560" y="438" class="small"><tspan x="560" dy="0">Lower marginal cost and reusable</tspan><tspan x="560" dy="15">policy knowledge</tspan></text><line x1="58" y1="464" x2="918" y2="464" stroke="#edf2f7"/><text x="65" y="488" class="small"><tspan x="65" dy="0">Rule-based bot</tspan></text><text x="270" y="488" class="small"><tspan x="270" dy="0">Rigid intents, weak at</tspan><tspan x="270" dy="15">unstructured complaints</tspan></text><text x="560" y="488" class="small"><tspan x="560" dy="0">Better natural-language coverage with</tspan><tspan x="560" dy="15">rule grounding</tspan></text><line x1="58" y1="514" x2="918" y2="514" stroke="#edf2f7"/><text x="65" y="538" class="small"><tspan x="65" dy="0">Generic LLM</tspan></text><text x="270" y="538" class="small"><tspan x="270" dy="0">Can hallucinate and is hard to</tspan><tspan x="270" dy="15">control for tone or policy</tspan></text><text x="560" y="538" class="small"><tspan x="560" dy="0">Merchant-specific rules, retrieval</tspan><tspan x="560" dy="15">context, and structured outputs</tspan></text><line x1="58" y1="564" x2="918" y2="564" stroke="#edf2f7"/></svg>